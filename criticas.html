<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordens Críticas - UO Lisboa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>
    
    <script>
(function() {
    'use strict';
    
    // DADOS ATUAIS (Podes substituir esta lista pelos dados do Excel)
    const DADOS = {
        "ordens": [
            {"ordem":"110015427992","ano":2025,"prestador":"Visabeira Loures","concelho":"LOURES","status":"AIMP","tipo":"MEQ1","centro":"LRS","categoria":"vermelho"},
            {"ordem":"110015428100","ano":2025,"prestador":"CME","concelho":"LISBOA","status":"EXEC","tipo":"ORD1","centro":"LIS","categoria":"amarelo"},
            {"ordem":"110015429500","ano":2025,"prestador":"Visabeira","concelho":"SINTRA","status":"PEND","tipo":"MEQ1","centro":"STN","categoria":"verde"}
        ]
    };

    function OrdensCriticas() {
        return React.createElement('div', null,
            // BARRA DE NAVEGAÇÃO PADRONIZADA
            React.createElement('div', { className: 'bg-gray-800 shadow-md mb-6 sticky top-0 z-50' },
                React.createElement('div', { className: 'max-w-7xl mx-auto px-6 py-3 flex items-center justify-between' },
                    React.createElement('div', { className: 'flex gap-4' },
                        React.createElement('a', { href: './index.html', className: 'px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition' }, '🏠 Dashboard'),
                        React.createElement('a', { href: './criticas.html', className: 'px-4 py-2 bg-yellow-400 text-black rounded-lg font-bold transition' }, '🚨 Ordens Críticas'),
                        React.createElement('a', { href: './relatorio.html', className: 'px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition' }, '📊 Relatório Diário'),
                        React.createElement('a', { href: './contactos.html', className: 'px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition' }, '📞 Contactos'),
                        React.createElement('a', { href: './interrupcoes.html', className: 'px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition' }, '🔌 Interrupções')
                    )
                )
            ),

            // CONTEÚDO (ESTILO ANTIGO)
            React.createElement('div', { className: 'max-w-7xl mx-auto px-6 py-8' },
                React.createElement('div', { className: 'flex justify-between items-center mb-6' },
                    React.createElement('h2', { className: 'text-2xl font-bold text-gray-800' }, '🚨 Ordens Críticas')
                ),
                
                React.createElement('div', { className: 'bg-white rounded-lg shadow-md overflow-hidden' },
                    React.createElement('table', { className: 'w-full text-left border-collapse' },
                        React.createElement('thead', { className: 'bg-gray-800 text-yellow-400' },
                            React.createElement('tr', null,
                                React.createElement('th', { className: 'px-4 py-3' }, 'Ordem'),
                                React.createElement('th', { className: 'px-4 py-3' }, 'Status'),
                                React.createElement('th', { className: 'px-4 py-3' }, 'Tipo'),
                                React.createElement('th', { className: 'px-4 py-3' }, 'Centro'),
                                React.createElement('th', { className: 'px-4 py-3' }, 'Concelho'),
                                React.createElement('th', { className: 'px-4 py-3' }, 'Prestador')
                            )
                        ),
                        React.createElement('tbody', null,
                            DADOS.ordens.map((ordem, index) => {
                                const bgColor = ordem.categoria === 'vermelho' ? 'bg-red-100' : ordem.categoria === 'amarelo' ? 'bg-yellow-50' : 'bg-white';
                                const emoji = ordem.categoria === 'vermelho' ? '🔴' : ordem.categoria === 'amarelo' ? '🟡' : '🟢';
                                
                                return React.createElement('tr', { key: index, className: `border-b hover:opacity-80 ${bgColor}` },
                                    React.createElement('td', { className: 'px-4 py-3 font-medium' }, ordem.ordem),
                                    React.createElement('td', { className: 'px-4 py-3' },
                                        React.createElement('span', { className: 'inline-block px-2 py-1 bg-yellow-100 text-black rounded text-xs font-medium border border-yellow-400' }, ordem.status)
                                    ),
                                    React.createElement('td', { className: 'px-4 py-3 font-bold text-gray-700' }, `${emoji} ${ordem.tipo}`),
                                    React.createElement('td', { className: 'px-4 py-3' }, ordem.centro),
                                    React.createElement('td', { className: 'px-4 py-3' }, ordem.concelho),
                                    React.createElement('td', { className: 'px-4 py-3 font-medium' }, ordem.prestador)
                                );
                            })
                        )
                    )
                )
            )
        );
    }

    // Renderização correta para React 18
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(OrdensCriticas));
    
})();
    </script>
</body>
</html>
