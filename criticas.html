<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Ordens Críticas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

<div class="max-w-7xl mx-auto p-6">
  <h1 class="text-3xl font-bold mb-4">🚨 Ordens Críticas</h1>
  <table class="w-full bg-white rounded shadow">
    <thead class="bg-gray-200">
      <tr>
        <th class="p-2 text-left">Ordem</th>
        <th class="p-2 text-left">Concelho</th>
        <th class="p-2 text-left">Estado</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const store = JSON.parse(localStorage.getItem("dashboardData") || "{}");
const dados = store.dados || [];

const criticas = dados.filter(o =>
  o.status_normalizado && o.status_normalizado !== "REAL"
);

document.getElementById("tbody").innerHTML = criticas.map(o => `
<tr class="border-b">
  <td class="p-2">${o.ORDEM || o.ordem}</td>
  <td class="p-2">${o.CONCELHO || ""}</td>
  <td class="p-2 text-red-600 font-bold">${o.status_normalizado}</td>
</tr>`).join("");
</script>
</body>
</html>
