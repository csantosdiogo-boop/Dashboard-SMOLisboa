<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordens Críticas - UO Lisboa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    
    <div class="bg-gray-800 shadow-md mb-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
            <div class="flex gap-4">
                <a href="./index.html" class="px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition">🏠 Dashboard</a>
                <a href="./criticas.html" class="px-4 py-2 bg-yellow-400 text-black rounded-lg font-bold transition">🚨 Ordens Críticas</a>
                <a href="./relatorio.html" class="px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition">📊 Relatório Diário</a>
                <a href="./contactos.html" class="px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition">📞 Contactos</a>
                <a href="./interrupcoes.html" class="px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition">🔌 Interrupções</a>
            </div>
            
            <button onclick="window.location.reload()" class="flex items-center gap-2 px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-bold transition text-sm shadow-lg">
                <span>🔄</span> Atualizar Dados
            </button>
        </div>
    </div>

    <div class="max-w-[98%] mx-auto py-4">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2 px-4">
                🚨 Listagem de Ordens Críticas (Dados 11 Março)
            </h2>
        </div>
        
        <div class="bg-white rounded-lg shadow-xl overflow-x-auto border border-gray-200">
            <table class="w-full text-left border-collapse min-w-max">
                <thead class="bg-gray-800 text-yellow-400 uppercase text-[11px] tracking-wider">
                    <tr>
                        <th class="px-3 py-4 border-b border-gray-700">Ordem</th>
                        <th class="px-3 py-4 border-b border-gray-700">Tipo</th>
                        <th class="px-3 py-4 border-b border-gray-700">Status</th>
                        <th class="px-3 py-4 border-b border-gray-700">CT</th>
                        <th class="px-3 py-4 border-b border-gray-700">Localidade</th>
                        <th class="px-3 py-4 border-b border-gray-700 text-center">Atraso</th>
                        <th class="px-3 py-4 border-b border-gray-700">Texto Breve</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo" class="divide-y divide-gray-200">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Dados extraídos do teu CSV (Exemplo com as primeiras linhas válidas)
        // Regra: Apenas ordens que NÃO começam por 21 ou 31
        const DADOS_CSV = [
            { id: "110015427992", tipo: "MEQ1", texto: "Revisão de Equipamento BTN", ct: "3101UOL1", status: "AIMP", local: "ODIVELAS", d_liberacao: "2025-09-12" },
            { id: "110015486148", tipo: "DSE1", texto: "Desligação eventual com equipamentos BTN", ct: "3101UOL1", status: "OE", local: "CHARNECA DA CAPARICA", d_liberacao: "2025-09-19" },
            { id: "110016507441", tipo: "RPD1", texto: "Restabel. agendado por acesso equip. BTN", ct: "3101UOL1", status: "OE CC", local: "CORROIOS", d_liberacao: "2025-12-28" },
            { id: "110009782066", tipo: "ALC1", texto: "Redução temporária da PC BTN", ct: "8116SXL1", status: "REAL NEFE", local: "FERNAO FERRO", d_liberacao: "2024-02-20" },
            { id: "110005040853", tipo: "IPC1", texto: "Interrupção BTN", ct: "8116SXL1", status: "REAL NEFE", local: "AMORA", d_liberacao: "2022-11-30" }
        ];

        function calcularDias(dataString) {
            const dataLib = new Date(dataString);
            const hoje = new Date();
            const diff = Math.floor((hoje - dataLib) / (1000 * 60 * 60 * 24));
            return diff;
        }

        function renderTabela() {
            const corpo = document.getElementById('tabela-corpo');
            
            corpo.innerHTML = DADOS_CSV
                .filter(o => !o.id.startsWith('21') && !o.id.startsWith('31')) // REGRA DE NEGÓCIO
                .map(ordem => {
                    const dias = calcularDias(ordem.d_liberacao);
                    
                    // Lógica de Gravidade
                    let bgColor = "bg-white";
                    let emoji = "🟢";
                    if (dias > 30) { bgColor = "bg-red-50"; emoji = "🔴"; }
                    else if (dias > 15) { bgColor = "bg-yellow-50"; emoji = "🟡"; }

                    return `
                        <tr class="hover:bg-gray-100 transition-colors ${bgColor}">
                            <td class="px-3 py-4 font-mono font-bold text-blue-900">${ordem.id}</td>
                            <td class="px-3 py-4 text-xs font-bold text-gray-500">${ordem.tipo}</td>
                            <td class="px-3 py-4">
                                <span class="px-2 py-0.5 bg-gray-200 text-[10px] font-black rounded border border-gray-300 uppercase">
                                    ${ordem.status}
                                </span>
                            </td>
                            <td class="px-3 py-4 text-xs font-bold text-gray-700">${ordem.ct}</td>
                            <td class="px-3 py-4 text-xs text-gray-600 uppercase">${ordem.local}</td>
                            <td class="px-3 py-4 font-black text-gray-800 text-center whitespace-nowrap">
                                ${emoji} ${dias} d
                            </td>
                            <td class="px-3 py-4 text-[10px] font-medium text-gray-500 uppercase leading-tight max-w-xs">
                                ${ordem.texto}
                            </td>
                        </tr>
                    `;
                }).join('');
        }

        renderTabela();
    </script>
</body>
</html>
