<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard UO Lisboa - E-REDES</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- HEADER -->
<div class="bg-slate-800 shadow-md sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 py-3 flex gap-3">
    <a href="./index.html" class="bg-yellow-400 text-black px-4 py-2 rounded font-bold">🏠 Dashboard</a>
    <a href="./criticas.html" class="text-yellow-400 px-4 py-2 font-bold">🚨 Ordens Críticas</a>
    <a href="./relatorio.html" class="text-yellow-400 px-4 py-2 font-bold">📊 Relatório</a>
    <a href="./interrupcoes.html" class="text-yellow-400 px-4 py-2 font-bold">⚡ Interrupções</a>
  </div>
</div>

<div class="max-w-7xl mx-auto p-6">

  <!-- CARD ESTADO -->
  <div class="bg-black border-4 border-yellow-400 rounded-xl p-6 mb-6">
    <h1 class="text-3xl font-bold text-yellow-400">Dashboard UO Lisboa</h1>
    <p id="estadoCarga" class="text-yellow-300 text-sm mt-2">
      ⚠️ Nenhum CSV carregado
    </p>
  </div>

  <!-- UPLOAD -->
  <div class="bg-white rounded-xl shadow p-6 mb-6">
    <h2 class="text-xl font-bold mb-4">📂 Carregar CSV diário</h2>
    <input type="file" id="csvFile" accept=".csv"
      class="block w-full border border-gray-300 rounded-lg p-2" />
  </div>

  <!-- KPIS -->
  <div id="kpis" class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6"></div>

  <!-- REAL POR EMPREITEIRO -->
  <div id="porEmpreiteiro" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
</div>

<script>
/* ========= REGRAS ========= */
function isValida(o) {
  const s = (o.STATUS || "").toUpperCase();
  if (s.startsWith("ANUL")) return false;
  if (s === "REAL NEFE") return false;
  return true;
}
function isReal(o) {
  return (o.STATUS || "").toUpperCase() === "REAL";
}

/* ========= CSV ========= */
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  const headers = lines[0].split(";").map(h => h.trim());
  return lines.slice(1).map(l => {
    const cols = l.split(";");
    const obj = {};
    headers.forEach((h,i)=>obj[h]=(cols[i]||"").trim());
    return obj;
  });
}

/* ========= RENDER ========= */
function render(store) {
  if (!store || !store.dados || store.dados.length===0) return;

  const dados = store.dados.filter(isValida);
  const total = dados.length;
  const real = dados.filter(isReal).length;
  const pendentes = total - real;
  const perc = total ? ((real/total)*100).toFixed(1) : 0;

  estadoCarga.innerText = "📅 Última atualização: " +
    new Date(store.timestamp).toLocaleString("pt-PT");

  kpis.innerHTML = `
    <div class="bg-white p-4 rounded shadow"><h3>Total</h3><p class="text-3xl font-bold">${total}</p></div>
    <div class="bg-white p-4 rounded shadow"><h3 class="text-green-600">REAL</h3><p class="text-3xl font-bold text-green-600">${real}</p></div>
    <div class="bg-white p-4 rounded shadow"><h3>Pendentes</h3><p class="text-3xl font-bold">${pendentes}</p></div>
    <div class="bg-white p-4 rounded shadow"><h3>% REAL</h3><p class="text-3xl font-bold">${perc}%</p></div>
  `;

  const emp = {};
  dados.filter(isReal).forEach(o=>{
    const e=o.EMPREITEIRO||"Outros";
    emp[e]=(emp[e]||0)+1;
  });

  porEmpreiteiro.innerHTML = Object.entries(emp).map(([e,v])=>`
    <div class="bg-white p-4 rounded shadow border-l-4 border-yellow-400">
      <h3 class="font-bold">${e}</h3>
      <p class="text-3xl font-bold text-green-600">${v}</p>
    </div>`).join("");
}

/* ========= LOAD ========= */
const stored = localStorage.getItem("dashboardData");
if (stored) render(JSON.parse(stored));

csvFile.onchange = e => {
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    const dados=parseCSV(r.result);
    const store={ timestamp:new Date().toISOString(), dados };
    localStorage.setItem("dashboardData",JSON.stringify(store));
    render(store);
  };
  r.readAsText(f,"UTF-8");
};
</script>
</body>
</html>
``
