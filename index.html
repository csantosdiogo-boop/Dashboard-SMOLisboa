<!-- =============================== -->
<!-- CSV → INDEXEDDB → PROPAGAÇÃO  -->
<!-- =============================== -->
<script>
/* =====================================
   CSV → INDEXEDDB → CRITICAS / RELATORIO
   NÃO ALTERA DESIGN / REACT
===================================== */
function parseCSV(text) {
  const lines = text.split(/\r?
/).filter(l => l.trim());
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).map(line => {
    const values = line.split(',');
    const obj = {};
    headers.forEach((h, i) => obj[h] = values[i]?.trim() || '');
    return obj;
  });
}
const DB_NAME = 'uoLisboaDashboard';
const STORE = 'kv';
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE)) {
        db.createObjectStore(STORE, { keyPath: 'key' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbSet(key, value) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put({ key, value });
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}
// Upload CSV
const csvInput = document.getElementById('csvInput');
csvInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const text = await file.text();
  const data = parseCSV(text);

  if (!data.length) {
    alert('CSV sem dados');
    return;
  }


  const snapshotDate =
    data[0]?.data_snapshot ||
    data[0]?.data ||
    new Date().toISOString().slice(0, 10);

  await idbSet('data_filtered', data);
  localStorage.setItem('otsSnapshotLabel', snapshotDate);

  // Reload para React + outras abas apanharem dados
  location.reload();
});
</script>
