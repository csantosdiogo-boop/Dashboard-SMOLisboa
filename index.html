<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Dashboard UO Lisboa</title>

    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="p-4">
    <input type="file" id="csvFile" class="mb-4" />
</div>

<div id="root"></div>

<script>
(function () {
    const e = React.createElement;

    const MAPA_PSL = {
        "8220VFX1": "Vila Franca de Xira",
        "8220SNT1": "Sintra",
        "8220OER1": "Oeiras",
        "8220ODV1": "Odivelas",
        "8220LRS1": "Loures",
        "8220LSB1": "Lisboa",
        "8220CSC1": "Cascais",
        "8220AMD1": "Amadora",
        "8220STB1": "Setúbal",
        "8220SSB1": "Sesimbra",
        "8220SXL1": "Seixal",
        "8220MTJ1": "Montijo",
        "8220MTA1": "Moita",
        "8220BRR1": "Barreiro",
        "8220ALM1": "Almada"
    };

    let dados = [];

    document.getElementById("csvFile").addEventListener("change", function (event) {
        const file = event.target.files[0];
        const reader = new FileReader();

        reader.onload = function (e) {
            const text = e.target.result;
            dados = parseCSV(text);
            render();
        };

        reader.readAsText(file);
    });

    function parseCSV(text) {
        const linhas = text.split("\n");
        const headers = linhas[0].split(";");

        return linhas.slice(1).map(linha => {
            const colunas = linha.split(";");

            let obj = {};
            headers.forEach((h, i) => {
                obj[h.trim()] = colunas[i];
            });

            let ordem = {
                id: obj["Ordem"],
                status: obj["Status usuário"] || "",
                ct: obj["CenTrab respon."] || "",
                empreiteiro: "Desconhecido"
            };

            if (MAPA_PSL[ordem.ct]) {
                ordem.empreiteiro = "Litoral Leituras";
                ordem.concelho = MAPA_PSL[ordem.ct];
            }

            return ordem;
        });
    }

    function agrupar(dados) {
        const res = {};

        dados.forEach(o => {
            if (!res[o.empreiteiro]) {
                res[o.empreiteiro] = {
                    total: 0,
                    real: 0,
                    op: 0,
                    pedp: 0
                };
            }

            res[o.empreiteiro].total++;

            if (o.status.includes("REAL")) res[o.empreiteiro].real++;
            if (o.status.includes("OP")) res[o.empreiteiro].op++;
            if (o.status.includes("PEDP")) res[o.empreiteiro].pedp++;
        });

        return res;
    }

    function App() {
        const dadosPrestadores = agrupar(dados);

        if (!dadosPrestadores["Litoral Leituras"]) {
            dadosPrestadores["Litoral Leituras"] = {
                total: 0,
                real: 0,
                op: 0,
                pedp: 0
            };
        }

        return e("div", { className: "p-6" },

            e("h1", { className: "text-3xl font-bold mb-6" }, "Dashboard UO Lisboa"),

            e("div", { className: "grid grid-cols-1 md:grid-cols-4 gap-4" },

                Object.entries(dadosPrestadores).map(([nome, d]) =>
                    e("div", {
                        key: nome,
                        className: "bg-white p-5 rounded-2xl shadow"
                    },
                        e("h2", { className: "font-bold text-lg mb-2" }, nome),
                        e("p", null, "Total: " + d.total),
                        e("p", null, "REAL: " + d.real),
                        e("p", null, "OP: " + d.op),
                        e("p", null, "PEDP: " + d.pedp)
                    )
                )
            )
        );
    }

    function render() {
        ReactDOM.render(e(App), document.getElementById("root"));
    }

})();
</script>

</body>
</html>
