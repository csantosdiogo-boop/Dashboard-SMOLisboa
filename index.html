    ]};

    function DashboardPrincipal() {
        const chartRef = React.useRef(null);
        const chartInstance = React.useRef(null);

        React.useEffect(() => {
            if (chartRef.current) {
                if (chartInstance.current) {
                    chartInstance.current.destroy();
                }

                const ctx = chartRef.current.getContext('2d');
                
                const stats = DADOS.ordens.reduce((acc, curr) => {
                    const status = curr.status.split(' ')[0];
                    acc[status] = (acc[status] || 0) + 1;
                    return acc;
                }, {});

                chartInstance.current = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(stats),
                        datasets: [{
                            data: Object.values(stats),
                            backgroundColor: [
                                '#f1c40f', '#3498db', '#e74c3c', '#2ecc71', '#9b59b6', '#34495e', '#1abc9c'

                            borderWidth: 2,
                            borderColor: '#ffffff'
                        }]

                        responsive: true,
                        maintainAspectRatio: false,

                    }
                });
            }

                        React.createElement('div', { className: 'relative', style: { height: '300px' } }, 
                            React.createElement('canvas', { ref: chartRef })
                        )
                    ),
                    React.createElement('div', { className: 'bg-gray-800 p-6 rounded-xl shadow-sm text-white flex flex-col justify-center' },

                        React.createElement('div', { className: 'space-y-6' },
                            React.createElement('div', null, 
                                React.createElement('p', { className: 'text-gray-400 text-sm font-bold uppercase' }, 'Total Ordens Ativas'),
                                React.createElement('p', { className: 'text-5xl font-black text-white' }, DADOS.ordens.length)
                            ),
                            React.createElement('div', { className: 'pt-6 border-t border-gray-700' },
                                React.createElement('p', { className: 'text-xs text-yellow-400 font-bold' }, '📅 DATA DOS DADOS:'),
                                React.createElement('p', { className: 'text-sm font-medium text-gray-300' }, '11 de Março de 2024')
                            )
                        )
                    )
                ),

                React.createElement('div', { className: 'bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden' },
                    React.createElement('div', { className: 'p-4 bg-gray-50 border-b border-gray-100 flex justify-between items-center' },
                        React.createElement('h3', { className: 'font-bold text-gray-700 uppercase text-sm' }, 'Listagem de Ordens'),
                        React.createElement('span', { className: 'text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded font-black' }, 'FILTRO OID: NOT 21/31')
                    ),
                    React.createElement('table', { className: 'w-full text-left' },

                                React.createElement('th', { className: 'px-4 py-3 text-[11px] font-black text-gray-500 uppercase' }, 'CT')

                            DADOS.ordens.map((ordem, index) =>

                                )
                            )
                        )
                    )
                )
            )
        );
    }
