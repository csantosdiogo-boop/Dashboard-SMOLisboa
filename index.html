                                            maintainAspectRatio: false,
                                            plugins: {
                                                legend: { display: false },
                                                tooltip: {

                                                    bodyColor: '#facc15',

                                                    borderWidth: 2,
                                                    padding: 12,
                                                    displayColors: false,

                                                        label: function(context) {
                                                            return context.parsed.y.toLocaleString() + ' ordens';
                                                        }
                                                    }
                                                }
                                            },
                                            scales: {
                                                y: {
                                                    beginAtZero: true,
                                                    ticks: {
                                                        callback: function(value) {

                                                    grid: { color: '#e5e7eb' }

                                                x: {
                                                    ticks: { font: { size: 13, weight: 'bold' } },
                                                    grid: { display: false }

                                            }
                                        }
                                    });
                                }
                            }
                        })

                React.createElement('div', { className: 'bg-white rounded-lg shadow-lg p-6 mb-6 border-4 border-yellow-400' },
                    React.createElement('h2', { className: 'text-2xl font-bold text-gray-800 mb-2' }, '1️⃣ Selecione o(s) Ano(s)'),

                    React.createElement('div', { className: 'grid grid-cols-3 md:grid-cols-7 gap-4' },
                        anos.map(ano => {
                            const total = anoStats[ano];
                            const isSelected = anosFiltro.includes(ano);
                            return React.createElement('button', {
                                key: ano,
                                onClick: () => toggleAno(ano),
                                className: `p-4 rounded-lg transition-all border-3 ${isSelected ? 'bg-yellow-400 text-black border-black shadow-lg scale-105 font-bold' : 'bg-gray-100 hover:bg-yellow-50 text-gray-800 border-gray-300'}`
                            },
                                React.createElement('div', { className: 'text-2xl font-bold' }, ano),
                                React.createElement('div', { className: 'text-sm mt-1' }, total.toLocaleString())

                    )
                ),

                React.createElement('div', { className: 'bg-gradient-to-r from-yellow-400 to-yellow-500 rounded-lg shadow-lg p-8 mb-6 text-black border-2 border-black' },

                    React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-4 gap-4' },
                        prestadores.map(prest => {
                            const total = statsAtual.byPrest[prest] || 0;
                            const percentagem = statsAtual.total > 0 ? ((total / statsAtual.total) * 100).toFixed(1) : 0;
                            const isSelected = prestadorFiltro === prest;
                            
                            return React.createElement('button', {
                                key: prest,
                                onClick: () => {
                                    setPrestadorFiltro(isSelected ? null : prest);
                                    setConcelhoFiltro(null);
                                },
                                className: `p-6 rounded-lg transition-all text-left border-2 ${isSelected ? 'bg-yellow-400 text-black border-black shadow-lg font-bold' : 'bg-gray-50 hover:bg-yellow-50 text-gray-800 border-gray-300'}`
                            },
                                React.createElement('div', { className: 'text-lg font-bold mb-1' }, prest),
                                React.createElement('div', { className: 'text-3xl font-bold' }, total.toLocaleString()),
                                React.createElement('div', { className: 'text-sm mt-1 flex items-center justify-between' },
                                    React.createElement('span', null, 'ordens'),
                                    React.createElement('span', { className: 'font-bold text-black bg-yellow-100 px-2 py-1 rounded' }, `${percentagem}%`)
                                )
                            );
                        })
                    )
                ),

                prestadorFiltro && concelhos.length > 0 && React.createElement('div', { className: 'bg-white rounded-lg shadow p-6 mb-6 border-2 border-gray-200' },
                    React.createElement('h2', { className: 'text-xl font-bold text-gray-800 mb-4' }, `Selecione o Concelho (${prestadorFiltro})`),
                    React.createElement('div', { className: 'grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3' },
                        concelhos.map(concelho => {
                            const total = statsAtual.byConcelho[concelho] || 0;
                            const isSelected = concelhoFiltro === concelho;
                            return React.createElement('button', {
                                key: concelho,
                                onClick: () => setConcelhoFiltro(isSelected ? null : concelho),
                                className: `p-3 rounded-lg transition-all border-2 ${isSelected ? 'bg-yellow-400 text-black border-black font-bold' : 'bg-gray-50 hover:bg-yellow-50 text-gray-800 border-gray-300'}`
                            },
                                React.createElement('div', { className: 'text-sm font-medium' }, concelho),
                                React.createElement('div', { className: 'text-xl font-bold mt-1' }, total)
                            );
                        })
                    )
                ),

                React.createElement('div', { className: 'bg-white rounded-lg shadow p-6 mb-6 border-2 border-gray-200' },
                    React.createElement('h2', { className: 'text-xl font-bold text-gray-800 mb-4' }, '3️⃣ Selecione o Status'),
                    React.createElement('div', { className: 'grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3' },
                        statusUnicos
                            .filter(status => (statsAtual.byStatus[status] || 0) > 0)
                            .map(status => {
                                const total = statsAtual.byStatus[status] || 0;
                                const isSelected = statusFiltro === status;
                                const descricao = statusDescricoes[status] || status;
                                
                                return React.createElement('button', {
                                    key: status,
                                    onClick: () => setStatusFiltro(isSelected ? null : status),
                                    className: `p-3 rounded-lg text-left transition border-2 ${isSelected ? 'bg-yellow-400 text-black border-black font-bold shadow-lg' : 'bg-gray-50 hover:bg-yellow-50 text-gray-800 border-gray-300'}`
                                },
                                    React.createElement('div', { className: 'text-xs font-bold truncate' }, status),
                                    React.createElement('div', { className: 'text-xs text-gray-600 mt-1 truncate', title: descricao }, descricao),
                                    React.createElement('div', { className: 'text-lg font-bold mt-1' }, total)
                                );
                            })
                    )
                ),

                // Filtros Ativos
                (anosFiltro.length > 0 || prestadorFiltro || concelhoFiltro || statusFiltro || pesquisaOrdem) && React.createElement('div', { className: 'bg-white rounded-lg shadow p-6 mb-6 border-2 border-yellow-400' },
                    React.createElement('h2', { className: 'text-xl font-semibold text-gray-800 mb-4' }, '🔍 Filtros Ativos'),
                    React.createElement('div', { className: 'flex flex-wrap gap-3 mb-4' },
                        anosFiltro.length > 0 && React.createElement('div', { className: 'px-4 py-2 bg-yellow-100 border-2 border-yellow-400 rounded-lg font-medium' }, 
                            `Ano${anosFiltro.length > 1 ? 's' : ''}: ${anosFiltro.join(', ')}`

                        prestadorFiltro && React.createElement('div', { className: 'flex items-center gap-2 px-4 py-2 bg-yellow-100 border-2 border-yellow-400 rounded-lg' },
                            React.createElement('span', { className: 'font-medium' }, `Prestador: ${prestadorFiltro}`),
                            React.createElement('button', { onClick: () => { setPrestadorFiltro(null); setConcelhoFiltro(null); }, className: 'text-black hover:text-red-600 font-bold' }, '✕')
                        ),
                        concelhoFiltro && React.createElement('div', { className: 'flex items-center gap-2 px-4 py-2 bg-yellow-100 border-2 border-yellow-400 rounded-lg' },
                            React.createElement('span', { className: 'font-medium' }, `Concelho: ${concelhoFiltro}`),
                            React.createElement('button', { onClick: () => setConcelhoFiltro(null), className: 'text-black hover:text-red-600 font-bold' }, '✕')
                        ),
                        statusFiltro && React.createElement('div', { className: 'flex items-center gap-2 px-4 py-2 bg-yellow-100 border-2 border-yellow-400 rounded-lg' },
                            React.createElement('span', { className: 'font-medium' }, `Status: ${statusFiltro}`),
                            React.createElement('button', { onClick: () => setStatusFiltro(null), className: 'text-black hover:text-red-600 font-bold' }, '✕')
                        ),
                        pesquisaOrdem && React.createElement('div', { className: 'flex items-center gap-2 px-4 py-2 bg-yellow-100 border-2 border-yellow-400 rounded-lg' },
                            React.createElement('span', { className: 'font-medium' }, `🔍 Pesquisa: "${pesquisaOrdem}"`),
                            React.createElement('button', { onClick: () => setPesquisaOrdem(''), className: 'text-black hover:text-red-600 font-bold' }, '✕')
                        ),
                        React.createElement('button', {
                            onClick: () => {
                                setAnosFiltro(['2025']);
                                setPrestadorFiltro(null);
                                setConcelhoFiltro(null);
                                setStatusFiltro(null);
                                setPesquisaOrdem('');
                            },
                            className: 'px-4 py-2 bg-black text-yellow-400 rounded-lg font-bold hover:bg-gray-800'
                        }, 'Limpar Todos')
                    ),
                    React.createElement('div', { className: 'text-lg font-bold text-black' }, `📊 Mostrando: ${ordensFiltradas.length.toLocaleString()} ordens (excluindo REAL, ANUL e NEFE)`)
                ),

                // Tabela
                React.createElement('div', { className: 'bg-white rounded-lg shadow p-6 border-2 border-gray-200' },
                    React.createElement('div', { className: 'flex items-center justify-between mb-4' },
                        React.createElement('h2', { className: 'text-xl font-semibold text-gray-800' }, `📋 Lista de Ordens (${ordensFiltradas.length.toLocaleString()})`),
                        React.createElement('button', {
                            onClick: exportarExcel,
                            className: 'px-4 py-2 bg-yellow-400 text-black font-bold rounded-lg hover:bg-yellow-500 transition border-2 border-black flex items-center gap-2'
                        },
                            React.createElement('span', null, '📥'),
                            ' Exportar Excel'
                        )
                    ),
                    React.createElement('div', { className: 'max-h-96 overflow-y-auto' },
                        React.createElement('table', { className: 'w-full text-sm' },
                            React.createElement('thead', { className: 'bg-black sticky top-0' },
                                React.createElement('tr', null,
                                    React.createElement('th', { className: 'px-4 py-3 text-left font-semibold text-yellow-400' }, 'N.º Ordem'),
                                    React.createElement('th', { className: 'px-4 py-3 text-left font-semibold text-yellow-400' }, 'Status'),
                                    React.createElement('th', { className: 'px-4 py-3 text-left font-semibold text-yellow-400' }, 'Tipo de Ordem'),
                                    React.createElement('th', { className: 'px-4 py-3 text-left font-semibold text-yellow-400' }, 'Ano'),
                                    React.createElement('th', { className: 'px-4 py-3 text-left font-semibold text-yellow-400' }, 'Concelho'),
                                    React.createElement('th', { className: 'px-4 py-3 text-left font-semibold text-yellow-400' }, 'Prestador'),
                                    React.createElement('th', { className: 'px-4 py-3 text-left font-semibold text-yellow-400' }, 'CT')
                                )
                            ),
                            React.createElement('tbody', { className: 'divide-y divide-gray-100' },
                                ordensFiltradas.map((ordem, index) =>
                                    React.createElement('tr', { key: index, className: 'hover:bg-yellow-50' },
                                        React.createElement('td', { className: 'px-4 py-3 font-medium text-gray-800' }, ordem.ordem),
                                        React.createElement('td', { className: 'px-4 py-3' },
                                            React.createElement('span', { className: 'inline-block px-2 py-1 bg-yellow-100 text-black rounded text-xs font-medium border border-yellow-400' }, ordem.status)
                                        ),
                                        React.createElement('td', { className: 'px-4 py-3 text-gray-700 text-sm' }, ordem.texto_breve),
                                        React.createElement('td', { className: 'px-4 py-3 text-gray-700' }, ordem.ano),
                                        React.createElement('td', { className: 'px-4 py-3 text-gray-700' }, ordem.concelho),
                                        React.createElement('td', { className: 'px-4 py-3 text-gray-700 font-medium' }, ordem.empreiteiro),
                                        React.createElement('td', { className: 'px-4 py-3 text-gray-600 text-xs' }, ordem.ct)
                                    )
                                )
                            )
                        )
                    )
                )
            )
        );
    }
    
    ReactDOM.render(React.createElement(DashboardPrincipal), document.getElementById('root'));
    
})();
    </script>
