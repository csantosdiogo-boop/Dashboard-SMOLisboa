<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard UO Lisboa - E-REDES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>
    
    <script>
(function() {
    'use strict';
    
    // DADOS REAIS 11 MARÇO (Filtrados: Sem 21... e 31...)
    const DADOS = {"ordens":[
        {"ordem":"110015427992","tipo":"MEQ1","texto_breve":"Revisão de Equipamento BTN","ct":"3101UOL1","status":"AIMP","concelho":"ODIVELAS","lib":"12/09/2025","empreiteiro":"Visabeira"},
        {"ordem":"110015486148","tipo":"DSE1","texto_breve":"Desligação eventual com equipamentos BTN","ct":"3101UOL1","status":"OE","concelho":"CHARNECA DA CAPARICA","lib":"19/09/2025","empreiteiro":"CME"},
        {"ordem":"110016507441","tipo":"RPD1","texto_breve":"Restabel. agendado por acesso equip. BTN","ct":"3101UOL1","status":"OE CC","concelho":"CORROIOS","lib":"28/12/2025","empreiteiro":"Visabeira"},
        {"ordem":"110009782066","tipo":"ALC1","texto_breve":"Redução temporária da PC BTN","ct":"8116SXL1","status":"REAL NEFE","concelho":"FERNAO FERRO","lib":"20/02/2024","empreiteiro":"CME"},
        {"ordem":"110005040853","tipo":"IPC1","texto_breve":"Interrupção BTN","ct":"8116SXL1","status":"REAL NEFE","concelho":"AMORA","lib":"30/11/2022","empreiteiro":"Visabeira"}
    ]};

    function DashboardPrincipal() {
        const chartRef = React.useRef(null);

        React.useEffect(() => {
            if (chartRef.current) {
                const ctx = chartRef.current.getContext('2d');
                const stats = DADOS.ordens.reduce((acc, curr) => {
                    acc[curr.status] = (acc[curr.status] || 0) + 1;
                    return acc;
                }, {});

                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(stats),
                        datasets: [{
                            data: Object.values(stats),
                            backgroundColor: ['#f1c40f', '#3498db', '#e74c3c', '#2ecc71', '#9b59b6'],
                            borderWidth: 2
                        }]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'bottom' } }
                    }
                });
            }
        }, []);

        return React.createElement('div', { className: 'min-h-screen' },
            // NAVBAR ORIGINAL
            React.createElement('div', { className: 'bg-gray-800 shadow-md mb-6' },
                React.createElement('div', { className: 'max-w-7xl mx-auto px-6 py-3 flex items-center justify-between' },
                    React.createElement('div', { className: 'flex gap-4' },
                        React.createElement('a', { href: './index.html', className: 'px-4 py-2 bg-yellow-400 text-black rounded-lg font-bold' }, '🏠 Dashboard'),
                        React.createElement('a', { href: './criticas.html', className: 'px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition' }, '🚨 Ordens Críticas'),
                        React.createElement('a', { href: './relatorio.html', className: 'px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition' }, '📊 Relatório Diário'),
                        React.createElement('a', { href: './contactos.html', className: 'px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition' }, '📞 Contactos'),
                        React.createElement('a', { href: './interrupcoes.html', className: 'px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition' }, '🔌 Interrupções')
                    ),
                    React.createElement('button', { onClick: () => window.location.reload(), className: 'px-4 py-2 bg-red-600 text-white rounded-lg font-bold text-sm shadow-md' }, '🔄 Atualizar Dados')
                )
            ),

            React.createElement('div', { className: 'max-w-7xl mx-auto px-6' },
                // INDICADORES EM GRID
                React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-4 gap-4 mb-8' },
                    React.createElement('div', { className: 'bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500' },
                        React.createElement('p', { className: 'text-xs font-bold text-gray-400 uppercase' }, 'Total Ordens'),
                        React.createElement('p', { className: 'text-3xl font-black' }, DADOS.ordens.length)
                    ),
                    React.createElement('div', { className: 'bg-white p-6 rounded-xl shadow-sm border-l-4 border-yellow-400' },
                        React.createElement('p', { className: 'text-xs font-bold text-gray-400 uppercase' }, 'Status Principal'),
                        React.createElement('p', { className: 'text-3xl font-black' }, 'AIMP')
                    )
                ),

                // GRÁFICO E LISTA
                React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-6 mb-8' },
                    React.createElement('div', { className: 'md:col-span-2 bg-white p-6 rounded-xl shadow-sm border' },
                        React.createElement('h2', { className: 'text-lg font-bold mb-4' }, 'Distribuição de Status'),
                        React.createElement('div', { style: { height: '350px', position: 'relative' } }, 
                            React.createElement('canvas', { ref: chartRef })
                        )
                    ),
                    React.createElement('div', { className: 'bg-gray-800 p-6 rounded-xl text-white' },
                        React.createElement('h2', { className: 'text-xl font-bold mb-4 text-yellow-400 underline' }, 'Resumo 11 Março'),
                        React.createElement('p', { className: 'text-sm mb-2' }, 'Filtro: Sem OID 21/31'),
                        React.createElement('p', { className: 'text-sm italic text-gray-400' }, 'As ordens apresentadas são apenas do tipo 11... para controlo de manutenção e avarias.')
                    )
                ),

                // TABELA
                React.createElement('div', { className: 'bg-white rounded-xl shadow-sm border overflow-hidden' },
                    React.createElement('table', { className: 'w-full text-left border-collapse' },
                        React.createElement('thead', { className: 'bg-gray-50 border-b' },
                            React.createElement('tr', null,
                                React.createElement('th', { className: 'px-4 py-3 text-xs font-bold uppercase' }, 'Nº Ordem'),
                                React.createElement('th', { className: 'px-4 py-3 text-xs font-bold uppercase' }, 'Status'),
                                React.createElement('th', { className: 'px-4 py-3 text-xs font-bold uppercase' }, 'Concelho'),
                                React.createElement('th', { className: 'px-4 py-3 text-xs font-bold uppercase' }, 'CT')
                            )
                        ),
                        React.createElement('tbody', null,
                            DADOS.ordens.map((o, i) => 
                                React.createElement('tr', { key: i, className: 'border-b hover:bg-yellow-50' },
                                    React.createElement('td', { className: 'px-4 py-3 font-bold text-blue-900' }, o.ordem),
                                    React.createElement('td', { className: 'px-4 py-3 text-xs font-bold' }, o.status),
                                    React.createElement('td', { className: 'px-4 py-3 text-xs uppercase' }, o.concelho),
                                    React.createElement('td', { className: 'px-4 py-3 text-xs font-mono' }, o.ct)
                                )
                            )
                        )
                    )
                )
            )
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(DashboardPrincipal));
})();
    </script>
</body>
</html>
