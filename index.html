<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Dashboard – Index</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

<header class="bg-gray-800 text-yellow-400 p-4 flex justify-between">
  <h1 class="font-bold">Dashboard UO Lisboa</h1>
  <label class="bg-yellow-400 text-black px-4 py-2 rounded cursor-pointer font-bold">
    Carregar CSV
    <input type="file" id="csvInput" accept=".csv" class="hidden">
  </label>
</header>

<main class="p-6 space-y-4">
  <div id="msg" class="text-sm"></div>

  <div id="metrics" class="grid grid-cols-3 gap-4 hidden">
    <div class="bg-white p-4 shadow rounded">
      <div class="text-gray-500 text-xs">Alterações de estado</div>
      <div id="altCount" class="text-2xl font-bold"></div>
    </div>
    <div class="bg-white p-4 shadow rounded">
      <div class="text-gray-500 text-xs">% ordens com alterações</div>
      <div id="altPct" class="text-2xl font-bold"></div>
    </div>
    <div class="bg-white p-4 shadow rounded">
      <div class="text-gray-500 text-xs">Ordens REAL</div>
      <div id="realCount" class="text-2xl font-bold"></div>
    </div>
  </div>

  <div class="space-x-4">
    <a href="criticas.html" class="underline">Críticas</a>
    <a href="relatorio.html" class="underline">Relatório</a>
  </div>
</main>

<script>
const DB = 'uoLisboaDB';
const STORE = 'data';

const COL_OT = 'OT';
const COL_STATUS = 'STATUS';
const COL_PRESTADOR = 'PRESTADOR';

const IGNORE_STATUS = ['REAL NEFE', 'REAL ANUL'];

function openDB() {
  return new Promise(res => {
    const r = indexedDB.open(DB, 1);
    r.onupgradeneeded = () => r.result.createObjectStore(STORE, { keyPath: 'k' });
    r.onsuccess = () => res(r.result);
  });
}

function parseCSV(t) {
  const [h, ...r] = t.split(/\r?\n/).filter(l => l.trim());
  const H = h.split(',');
  return r.map(l => {
    const o = {};
    l.split(',').forEach((v,i)=>o[H[i]]=v?.trim());
    return o;
  });
}

function isValidStatus(s) {
  if (!s) return false;
  if (IGNORE_STATUS.includes(s)) return false;
  return true;
}

function isReal(s) {
  return s?.startsWith('REAL') && s !== 'REAL NEFE';
}

document.getElementById('csvInput').addEventListener('change', async e => {
  const text = await e.target.files[0].text();
  const raw = parseCSV(text);
  const data = raw.filter(r => isValidStatus(r[COL_STATUS]));

  const db = await openDB();
  db.transaction(STORE,'readwrite').objectStore(STORE).put({k:'csv', v:data});

  // ---- métricas ----
  const byOT = {};
  data.forEach(r => {
    const ot = r[COL_OT];
    if (!byOT[ot]) byOT[ot] = [];
    byOT[ot].push(r[COL_STATUS]);
  });

  let alt = 0;
  let otsComAlt = 0;

  Object.values(byOT).forEach(states => {
    let changes = 0;
    for (let i=1;i<states.length;i++) {
      if (states[i] !== states[i-1]) changes++;
    }
    if (changes > 0) otsComAlt++;
    alt += changes;
  });

  const totalOT = Object.keys(byOT).length;
  const realCount = data.filter(r => isReal(r[COL_STATUS])).length;

  document.getElementById('altCount').textContent = alt;
  document.getElementById('altPct').textContent =
    totalOT ? ((otsComAlt/totalOT)*100).toFixed(1)+'%' : '0%';
  document.getElementById('realCount').textContent = realCount;

  document.getElementById('metrics').classList.remove('hidden');
  document.getElementById('msg').innerHTML =
    `<span class="text-green-700 font-bold">CSV carregado com sucesso</span> (${data.length} linhas)`;
});
</script>
</body>
</html>
