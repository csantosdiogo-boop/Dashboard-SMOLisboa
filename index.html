<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard UO Lisboa - E-REDES</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">
  <!-- HEADER -->
  <div class="bg-gray-800 shadow-md mb-6 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-3 flex gap-4">
      <a href="./" class="px-4 py-2 bg-yellow-400 text-black rounded-lg font-bold">🏠 Dashboard</a>
      <a href="./criticas.html" class="px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold">🚨 Ordens Críticas</a>
      <a href="./relatorio.html" class="px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold">📊 Relatório</a>
      <a href="./interrupcoes.html" class="px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold">⚡ Interrupções</a>
    </div>
  </div>

  <div class="max-w-4xl mx-auto p-6">
    <div class="bg-black border-4 border-yellow-400 rounded-lg p-6 mb-6">
      <h1 class="text-3xl font-bold text-yellow-400">Dashboard UO Lisboa</h1>
      <p id="statusMsg" class="text-yellow-300 mt-2 text-sm">
        ⚠️ Nenhum CSV carregado
      </p>
    </div>

    <div class="bg-white rounded-lg shadow-lg p-6">
      <h2 class="text-xl font-bold mb-4">📂 Carregar CSV diário</h2>
      <input type="file" id="csvFile" accept=".csv"
        class="block w-full border border-gray-300 rounded p-2" />
    </div>
  </div>

<script>
function normalizeStatus(status) {
  if (!status) return null;
  status = status.toUpperCase().trim();
  if (status === "REAL NEFE") return null;
  if (status startsWith("ANUL")) return null;
  if (status === "REAL") return "REAL";
  return status;
}

function parseCSV(content) {
  const lines = content.split(/\r?\n/).filter(l => l.trim() !== "");
  const headers = lines[0].split(";").map(h => h.trim());
  return lines.slice(1).map(line => {
    const cols = line.split(";");
    const obj = {};
    headers.forEach((h, i) => obj[h] = (cols[i] || "").trim());
    obj.status_normalizado = normalizeStatus(obj.STATUS || obj.status);
    return obj;
  });
}

document.getElementById("csvFile").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    const data = parseCSV(reader.result);
    localStorage.setItem("dashboardData", JSON.stringify({
      timestamp: new Date().toISOString(),
      total: data.length,
      dados: data
    }));
    document.getElementById("statusMsg").innerText =
      "✅ CSV carregado com sucesso às " + new Date().toLocaleString("pt-PT");
  };
  reader.readAsText(file, "UTF-8");
});
</script>
</body>
</html>
