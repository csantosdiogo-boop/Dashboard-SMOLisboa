<!-- ⚠️ BOTÃO DE UPLOAD JÁ EXISTENTE NO TEU DESIGN -->
<input type="file" id="csvInput" accept=".csv" class="hidden" />

<script src="./js/store.js"></script>
<script>
// ===============================
// INDEX = ÚNICO PONTO DE ENTRADA
// ===============================

document.getElementById('csvInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const text = await file.text();
  const data = parseCSV(text);

  // 📅 Data vem do ficheiro (prioridade absoluta)
  const snapshotDate =
    data[0]?.data_snapshot ||
    data[0]?.data ||
    data[0]?.Data ||
    new Date().toISOString().slice(0,10);

  await saveSnapshot(snapshotDate, data);

  // ✅ etiqueta de data usada por TODAS as abas
  localStorage.setItem('otsSnapshotLabel', snapshotDate);
