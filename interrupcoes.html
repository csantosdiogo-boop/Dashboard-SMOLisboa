<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interrupções e Ligações - UO Lisboa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .filter-btn.active { background-color: #facc15; color: black; border-color: #facc15; }
    </style>
</head>
<body class="bg-gray-50">
    
    <div class="bg-gray-800 shadow-md mb-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
            <div class="flex gap-4">
                <a href="./index.html" class="px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition">🏠 Dashboard</a>
                <a href="./criticas.html" class="px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition">🚨 Ordens Críticas</a>
                <a href="./relatorio.html" class="px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition">📊 Relatório Diário</a>
                <a href="./contactos.html" class="px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition">📞 Contactos</a>
                <a href="./interrupcoes.html" class="px-4 py-2 bg-yellow-400 text-black rounded-lg font-bold transition">🔌 Interrupções</a>
            </div>
            
            <button onclick="resetDados()" class="flex items-center gap-2 px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-bold transition text-sm">
                <span>🔄</span> Atualizar Dados
            </button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6">
        <div class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">🔌 Interrupções e Ligações</h1>
                <p class="text-gray-600">Registo e controlo de ordens de interrupção em curso.</p>
            </div>
            
            <div class="flex gap-4 text-center">
                <div class="bg-white p-3 rounded-lg shadow-sm border-b-4 border-yellow-400">
                    <p class="text-xs text-gray-500 uppercase font-bold">Total Ativas</p>
                    <p id="stat-total" class="text-2xl font-black">0</p>
                </div>
                <div class="bg-white p-3 rounded-lg shadow-sm border-b-4 border-red-500">
                    <p class="text-xs text-gray-500 uppercase font-bold">Críticas</p>
                    <p id="stat-red" class="text-2xl font-black text-red-600">0</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-200">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2">📝 Nova Ordem</h3>
                    <form id="form-ordem" class="space-y-4">
                        <input type="text" id="input-ordem" placeholder="Nº Ordem (Ex: 1100...)" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-yellow-400 outline-none" required>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="input-centro" placeholder="Centro (Ex: LRS)" class="p-3 border rounded-lg outline-none uppercase">
                            <input type="text" id="input-concelho" placeholder="Concelho" class="p-3 border rounded-lg outline-none">
                        </div>
                        <select id="input-tipo" class="w-full p-3 border rounded-lg outline-none">
                            <option value="Normal">Tipo: Normal</option>
                            <option value="Urgente">Tipo: Urgente</option>
                            <option value="Crítica">Tipo: Crítica 🔴</option>
                        </select>
                        <input type="text" id="input-nome" placeholder="Responsável / Operador" class="w-full p-3 border rounded-lg outline-none">
                        <button type="submit" class="w-full py-3 bg-gray-800 text-yellow-400 font-bold rounded-lg hover:bg-gray-700 transition uppercase tracking-wider">Registar Ordem</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
                    <button onclick="filtrar('todas')" class="filter-btn active px-4 py-2 border rounded-full text-sm font-bold transition">Todas</button>
                    <button onclick="filtrar('ativas')" class="filter-btn px-4 py-2 border rounded-full text-sm font-bold transition">Em Curso</button>
                    <button onclick="filtrar('concluidas')" class="filter-btn px-4 py-2 border rounded-full text-sm font-bold transition">Concluídas</button>
                </div>

                <div id="lista-ordens" class="space-y-3">
                    </div>
            </div>
        </div>
    </div>

    <script>
        let ordens = JSON.parse(localStorage.getItem('ordens_interrupcoes')) || [];
        let filtroAtual = 'todas';

        function saveOrdens() {
            localStorage.setItem('ordens_interrupcoes', JSON.stringify(ordens));
        }

        function resetDados() {
            if(confirm('Atenção: Isto irá apagar todas as interrupções registadas nesta página. Continuar?')) {
                localStorage.removeItem('ordens_interrupcoes');
                location.reload();
            }
        }

        document.getElementById('form-ordem').addEventListener('submit', (e) => {
            e.preventDefault();
            const novaOrdem = {
                id: Date.now(),
                num: document.getElementById('input-ordem').value,
                centro: document.getElementById('input-centro').value.toUpperCase(),
                concelho: document.getElementById('input-concelho').value,
                tipo: document.getElementById('input-tipo').value,
                nome: document.getElementById('input-nome').value,
                data: new Date().toLocaleString('pt-PT'),
                concluida: false
            };
            ordens.unshift(novaOrdem);
            saveOrdens();
            render();
            e.target.reset();
        });

        function concluirOrdem(id) {
            ordens = ordens.map(o => o.id === id ? {...o, concluida: true, dataFim: new Date().toLocaleString('pt-PT')} : o);
            saveOrdens();
            render();
        }

        function filtrar(tipo) {
            filtroAtual = tipo;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase().includes(tipo.replace('as','')) || (tipo==='todas' && btn.innerText==='Todas'));
            });
            render();
        }

        function render() {
            const lista = document.getElementById('lista-ordens');
            const filtradas = ordens.filter(o => {
                if (filtroAtual === 'ativas') return !o.concluida;
                if (filtroAtual === 'concluidas') return o.concluida;
                return true;
            });

            document.getElementById('stat-total').innerText = ordens.filter(o => !o.concluida).length;
            document.getElementById('stat-red').innerText = ordens.filter(o => !o.concluida && o.tipo === 'Crítica').length;

            lista.innerHTML = filtradas.map(o => `
                <div class="bg-white p-4 rounded-lg shadow border-l-4 ${o.concluida ? 'border-gray-400 opacity-60' : (o.tipo === 'Crítica' ? 'border-red-500' : 'border-yellow-400')} flex justify-between items-center">
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-lg">${o.num}</span>
                            <span class="text-xs px-2 py-0.5 bg-gray-100 rounded border">${o.tipo}</span>
                        </div>
                        <p class="text-sm text-gray-600">${o.centro} - ${o.concelho} | <span class="text-xs">Resp: ${o.nome}</span></p>
                        <p class="text-[10px] text-gray-400 uppercase mt-1">Início: ${o.data} ${o.concluida ? ` | Fim: ${o.dataFim}` : ''}</p>
                    </div>
                    ${!o.concluida ? `
                        <button onclick="concluirOrdem(${o.id})" class="px-4 py-2 bg-green-500 hover:bg-green-600 text-white text-xs font-bold rounded-lg transition">CONCLUIR</button>
                    ` : '<span class="text-green-600 font-bold text-xs font-mono">✅ FINALIZADA</span>'}
                </div>
            `).join('');
        }

        render();
    </script>
</body>
</html>
