<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interrupções e Ligações - UO Lisboa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilo original que gostavas */
        .filter-btn.active { background: #2c3e50; color: #f1c40f; border-color: #2c3e50; }
        .card-ordem { transition: all 0.2s; border-left-width: 6px; }
        .card-ordem:hover { transform: translateX(5px); }
        select, input { cursor: pointer; }
    </style>
</head>
<body class="bg-gray-100">

    <div class="bg-gray-800 shadow-md mb-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
            <div class="flex gap-4">
                <a href="./index.html" class="px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition">🏠 Dashboard</a>
                <a href="./criticas.html" class="px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition">🚨 Ordens Críticas</a>
                <a href="./relatorio.html" class="px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition">📊 Relatório Diário</a>
                <a href="./contactos.html" class="px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition">📞 Contactos</a>
                <a href="./interrupcoes.html" class="px-4 py-2 bg-yellow-400 text-black rounded-lg font-bold">🔌 Interrupções</a>
            </div>
            
            <button onclick="resetDados()" class="flex items-center gap-2 px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-bold transition text-sm shadow-lg">
                <span>🔄</span> Atualizar Dados
            </button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 pb-10">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-xl shadow-md border border-gray-200">
                    <h2 class="text-xl font-bold mb-5 text-gray-800 border-b pb-2">📝 Registar Interrupção</h2>
                    <form id="form-ordem" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nº Ordem</label>
                            <input type="text" id="input-ordem" placeholder="Ex: 1100..." class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-yellow-400 outline-none" required>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Centro (CT)</label>
                                <select id="input-centro" class="w-full p-3 border rounded-lg outline-none bg-gray-50 font-bold">
                                    <option value="LIS">LIS (Lisboa)</option>
                                    <option value="LRS">LRS (Loures)</option>
                                    <option value="STN">STN (Sintra)</option>
                                    <option value="VFX">VFX (Vila Franca)</option>
                                    <option value="CAS">CAS (Cascais)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Concelho</label>
                                <select id="input-concelho" class="w-full p-3 border rounded-lg outline-none bg-gray-50">
                                    <option value="LISBOA">Lisboa</option>
                                    <option value="LOURES">Loures</option>
                                    <option value="SINTRA">Sintra</option>
                                    <option value="CASCAIS">Cascais</option>
                                    <option value="OEIRAS">Oeiras</option>
                                    <option value="AMADORA">Amadora</option>
                                    <option value="ODIVELAS">Odivelas</option>
                                    <option value="V.F.XIRA">V.F. Xira</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Prioridade</label>
                            <select id="input-tipo" class="w-full p-3 border rounded-lg outline-none bg-gray-50 font-bold text-gray-700">
                                <option value="Normal">🟢 Normal</option>
                                <option value="Urgente">🟡 Urgente</option>
                                <option value="Crítica">🔴 Crítica</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Operador / Responsável</label>
                            <input type="text" id="input-nome" placeholder="Nome do técnico" class="w-full p-3 border rounded-lg outline-none">
                        </div>

                        <button type="submit" class="w-full py-4 bg-gray-800 text-yellow-400 font-bold rounded-lg hover:bg-gray-700 transition uppercase shadow-md">Adicionar à Lista</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex gap-2">
                        <button onclick="filtrar('todas')" id="btn-todas" class="filter-btn active px-4 py-2 border rounded-lg text-sm font-bold transition shadow-sm bg-white">Todas</button>
                        <button onclick="filtrar('ativas')" id="btn-ativas" class="filter-btn px-4 py-2 border rounded-lg text-sm font-bold transition shadow-sm bg-white">Em Curso</button>
                    </div>
                    <div class="text-sm font-bold text-gray-500 uppercase">
                        Total Ativas: <span id="stat-total" class="text-gray-900 bg-yellow-400 px-2 py-1 rounded ml-1">0</span>
                    </div>
                </div>

                <div id="lista-ordens" class="space-y-4">
                    </div>
            </div>
        </div>
    </div>

    <script>
        let ordens = JSON.parse(localStorage.getItem('ordens_interrupcoes')) || [];
        let filtroAtual = 'todas';

        function saveOrdens() { localStorage.setItem('ordens_interrupcoes', JSON.stringify(ordens)); }

        function resetDados() {
            if(confirm('Limpar todas as interrupções?')) {
                localStorage.removeItem('ordens_interrupcoes');
                location.reload();
            }
        }

        document.getElementById('form-ordem').addEventListener('submit', (e) => {
            e.preventDefault();
            const novaOrdem = {
                id: Date.now(),
                num: document.getElementById('input-ordem').value,
                centro: document.getElementById('input-centro').value,
                concelho: document.getElementById('input-concelho').value,
                tipo: document.getElementById('input-tipo').value,
                nome: document.getElementById('input-nome').value || "Não definido",
                data: new Date().toLocaleTimeString('pt-PT', {hour: '2-digit', minute:'2-digit'}),
                concluida: false
            };
            ordens.unshift(novaOrdem);
            saveOrdens();
            render();
            e.target.reset();
        });

        function concluirOrdem(id) {
            ordens = ordens.map(o => o.id === id ? {...o, concluida: true} : o);
            saveOrdens();
            render();
        }

        function filtrar(tipo) {
            filtroAtual = tipo;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + tipo).classList.add('active');
            render();
        }

        function render() {
            const lista = document.getElementById('lista-ordens');
            const filtradas = ordens.filter(o => filtroAtual === 'ativas' ? !o.concluida : true);
            
            document.getElementById('stat-total').innerText = ordens.filter(o => !o.concluida).length;

            if (filtradas.length === 0) {
                lista.innerHTML = '<div class="text-center py-10 text-gray-400 italic bg-white rounded-xl border-2 border-dashed">Sem registos para mostrar</div>';
                return;
            }

            lista.innerHTML = filtradas.map(o => `
                <div class="card-ordem bg-white p-5 rounded-xl shadow-sm border
