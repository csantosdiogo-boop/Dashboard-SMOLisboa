<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Interrupções</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

<div class="max-w-7xl mx-auto p-6">
  <h1 class="text-3xl font-bold mb-4">⚡ Interrupções</h1>
  <p>Total de registos: <span id="total"></span></p>
</div>

<script>
const store = JSON.parse(localStorage.getItem("dashboardData") || "{}");
document.getElementById("total").innerText = (store.dados || []).length;
</script>

</body>
</html>
