<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Diário - UO Lisboa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    
    <div class="bg-gray-800 shadow-md mb-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
            <div class="flex gap-4">
                <a href="./" class="px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition">🏠 Dashboard</a>
                <a href="./criticas.html" class="px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition">🚨 Ordens Críticas</a>
                <a href="./relatorio.html" class="px-4 py-2 bg-yellow-400 text-black rounded-lg font-bold">📊 Relatório Diário</a>
                <a href="./contactos.html" class="px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition">📞 Contactos</a>
            </div>
            <button onclick="window.location.reload()" class="px-4 py-2 bg-yellow-400 text-black rounded-lg font-bold hover:bg-yellow-500 transition flex items-center gap-2">
                <span>🔄</span>
                <span class="hidden md:inline">Refresh</span>
            </button>
        </div>
    </div>
    
    <div class="max-w-7xl mx-auto p-6">
        
        <div class="bg-black rounded-lg shadow-lg p-6 mb-6 border-4 border-yellow-400">
            <h1 class="text-3xl font-bold text-yellow-400 mb-2">📊 Relatório Diário de Ordens</h1>
            <p class="text-yellow-400 text-sm" id="data-relatorio">UO Lisboa | E-REDES</p>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
            <div class="bg-white rounded-lg shadow p-6 border-l-4 border-blue-500">
                <h3 class="text-gray-500 text-sm font-semibold mb-2">ANTERIOR</h3>
                <p class="text-3xl font-bold text-gray-800" id="total-ontem">-</p>
            </div>
            <div class="bg-white rounded-lg shadow p-6 border-l-4 border-green-500">
                <h3 class="text-gray-500 text-sm font-semibold mb-2">HOJE</h3>
                <p class="text-3xl font-bold text-gray-800" id="total-hoje">-</p>
            </div>
            <div class="bg-white rounded-lg shadow p-6 border-l-4 border-yellow-500">
                <h3 class="text-gray-500 text-sm font-semibold mb-2">VARIAÇÃO</h3>
                <p class="text-3xl font-bold" id="variacao">-</p>
                <p class="text-sm font-semibold mt-1" id="variacao-pct">-</p>
            </div>
            <div class="bg-gradient-to-br from-green-500 to-green-600 rounded-lg shadow-lg p-6 border-l-4 border-green-700">
                <h3 class="text-white text-sm font-semibold mb-2">✅ CONCLUÍDAS</h3>
                <p class="text-4xl font-bold text-white" id="total-real">-</p>
                <p class="text-sm font-semibold mt-1 text-green-100">Desde último update</p>
            </div>
        </div>
        
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6 border-2 border-gray-200">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">🏢 Comparação por Prestador</h2>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="px-4 py-2 text-left text-sm font-semibold text-gray-700">Prestador</th>
                            <th class="px-4 py-2 text-right text-sm font-semibold text-gray-700">Anterior</th>
                            <th class="px-4 py-2 text-right text-sm font-semibold text-gray-700">Hoje</th>
                            <th class="px-4 py-2 text-right text-sm font-semibold text-gray-700">Variação</th>
                            <th class="px-4 py-2 text-right text-sm font-semibold text-gray-700">%</th>
                            <th class="px-4 py-2 text-right text-sm font-semibold text-green-700 bg-green-50">✅ Concluídas</th>
                            <th class="px-4 py-2 text-right text-sm font-semibold text-green-700 bg-green-50">%</th>
                        </tr>
                    </thead>
                    <tbody id="prestadores-tbody">
                    </tbody>
                </table>
            </div>
        </div>
        
    </div>
    
    <script>
const RELATORIO = {"data":"10/02/2026","totais":{"ontem":29742,"hoje":20326,"diferenca":-9416},"mudancas":{"total":0,"para_real":9416,"para_anul":0,"para_nefe":0,"outras":0},"top_mudancas":[{"tipo":"Concluídas/REAL","quantidade":9416}],"anos":{"2020":{"ontem":0,"hoje":248,"diferenca":0,"variacao_pct":0},"2021":{"ontem":0,"hoje":210,"diferenca":0,"variacao_pct":0},"2022":{"ontem":0,"hoje":761,"diferenca":0,"variacao_pct":0},"2023":{"ontem":0,"hoje":2137,"diferenca":0,"variacao_pct":0},"2024":{"ontem":0,"hoje":1585,"diferenca":0,"variacao_pct":0},"2025":{"ontem":0,"hoje":3864,"diferenca":0,"variacao_pct":0},"2026":{"ontem":0,"hoje":11521,"diferenca":0,"variacao_pct":0}},"prestadores":{"CME Lisboa":{"ontem":16227,"hoje":10586,"diferenca":-5641,"real":5641,"pct_real":34.76},"Visabeira Loures":{"ontem":9192,"hoje":6213,"diferenca":-2979,"real":2979,"pct_real":32.41},"CME Setúbal":{"ontem":4323,"hoje":3527,"diferenca":-796,"real":796,"pct_real":18.41}},"real":{"total":9416,"por_prestador":{}}};

document.getElementById('data-relatorio').textContent = `Relatório de ${RELATORIO.data} | UO Lisboa | E-REDES`;
document.getElementById('total-ontem').textContent = RELATORIO.totais.ontem.toLocaleString('pt-PT');
document.getElementById('total-hoje').textContent = RELATORIO.totais.hoje.toLocaleString('pt-PT');
document.getElementById('total-real').textContent = RELATORIO.real.total.toLocaleString('pt-PT');

const variacaoEl = document.getElementById('variacao');
const variacaoPctEl = document.getElementById('variacao-pct');
const diff = RELATORIO.totais.diferenca;
const pct = RELATORIO.totais.ontem > 0 ? ((diff / RELATORIO.totais.ontem) * 100) : 0;
const sinalPct = pct >= 0 ? '+' : '';

variacaoEl.textContent = (diff >= 0 ? '+' : '') + diff.toLocaleString('pt-PT');
variacaoEl.className = diff >= 0 ? 'text-3xl font-bold text-green-600' : 'text-3xl font-bold text-red-600';
variacaoPctEl.textContent = `(${sinalPct}${pct.toFixed(2)}%)`;
variacaoPctEl.className = diff >= 0 ? 'text-sm font-semibold mt-1 text-green-600' : 'text-sm font-semibold mt-1 text-red-600';

const prestadoresTbody = document.getElementById('prestadores-tbody');
Object.entries(RELATORIO.prestadores).forEach(([prest, dados]) => {
    const tr = document.createElement('tr');
    tr.className = 'border-b hover:bg-gray-50';
    
    const varClass = dados.diferenca > 0 ? 'text-green-600' : dados.diferenca < 0 ? 'text-red-600' : 'text-gray-600';
    const sinal = dados.diferenca >= 0 ? '+' : '';
    
    const pct = dados.ontem > 0 ? ((dados.diferenca / dados.ontem) * 100) : 0;
    const pctClass = pct > 0 ? 'text-green-600' : pct < 0 ? 'text-red-600' : 'text-gray-600';
    const pctSinal = pct >= 0 ? '+' : '';
    
    tr.innerHTML = `
        <td class="px-4 py-3 text-sm font-semibold text-gray-800">${prest}</td>
        <td class="px-4 py-3 text-sm text-gray-600 text-right">${dados.ontem.toLocaleString('pt-PT')}</td>
        <td class="px-4 py-3 text-sm text-gray-800 text-right font-semibold">${dados.hoje.toLocaleString('pt-PT')}</td>
        <td class="px-4 py-3 text-sm ${varClass} text-right font-bold">${sinal}${dados.diferenca.toLocaleString('pt-PT')}</td>
        <td class="px-4 py-3 text-sm ${pctClass} text-right font-bold">${pctSinal}${pct.toFixed(2)}%</td>
        <td class="px-4 py-3 text-sm text-green-700 text-right font-bold bg-green-50">${dados.real.toLocaleString('pt-PT')}</td>
        <td class="px-4 py-3 text-sm text-green-700 text-right font-bold bg-green-50">${dados.pct_real.toFixed(2)}%</td>
    `;
    prestadoresTbody.appendChild(tr);
});
    </script>
    
</body>
</html>
