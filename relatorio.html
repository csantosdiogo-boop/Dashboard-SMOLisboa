<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Relatório Diário</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

<div class="max-w-7xl mx-auto p-6">
  <h1 class="text-3xl font-bold mb-4">📊 Relatório Diário</h1>
  <p id="info" class="mb-4 text-gray-600"></p>
  <div id="resumo" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
</div>

<script>
const store = JSON.parse(localStorage.getItem("dashboardData") || "{}");
const dados = store.dados || [];

const total = dados.length;
const real = dados.filter(o => o.status_normalizado === "REAL").length;
const restantes = total - real;
const percent = total ? ((real / total) * 100).toFixed(1) : 0;

document.getElementById("info").innerText =
  "Base carregada em: " + new Date(store.timestamp || "").toLocaleString("pt-PT");

document.getElementById("resumo").innerHTML = `
<div class="bg-white p-4 rounded shadow">
  <h3 class="font-bold">Total</h3>
  <p class="text-2xl">${total}</p>
</div>
<div class="bg-white p-4 rounded shadow">
  <h3 class="font-bold text-green-600">REAL</h3>
  <p class="text-2xl">${real}</p>
</div>
<div class="bg-white p-4 rounded shadow">
  <h3 class="font-bold">% REAL</h3>
  <p class="text-2xl">${percent}%</p>
</div>`;
</script>
</body>
</html>
