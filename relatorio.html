<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Diário - UO Lisboa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    
    <div class="bg-gray-800 shadow-md mb-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
            <div class="flex gap-4">
                <a href="./" class="px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition">🏠 Dashboard</a>
                <a href="./criticas.html" class="px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition">🚨 Ordens Críticas</a>
                <a href="./relatorio.html" class="px-4 py-2 bg-yellow-400 text-black rounded-lg font-bold">📊 Relatório Diário</a>
                <a href="./contactos.html" class="px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition">📞 Contactos</a>
                <a href="./interrupcoes.html" class="px-4 py-2 text-yellow-400 hover:bg-gray-700 rounded-lg font-bold transition">⚡ Interrupções</a>
            </div>
            <button onclick="window.location.reload()" class="px-4 py-2 bg-yellow-400 text-black rounded-lg font-bold hover:bg-yellow-500 transition flex items-center gap-2">
                <span>🔄</span>
                <span class="hidden md:inline">Refresh</span>
            </button>
        </div>
    </div>
    
    <div class="max-w-7xl mx-auto p-6">
        
        <div class="bg-black rounded-lg shadow-lg p-6 mb-6 border-4 border-yellow-400">
            <h1 class="text-3xl font-bold text-yellow-400 mb-2">📊 Relatório Diário de Ordens</h1>
            <p class="text-yellow-400 text-sm">UO Lisboa | E-REDES | Atualizado: 05/03/2025</p>
        </div>
        
        <!-- EVOLUÇÃO SEMANAL -->
        <div class="bg-gradient-to-br from-yellow-400 to-yellow-500 rounded-lg shadow-lg p-6 mb-6 border-4 border-yellow-600">
            <h2 class="text-3xl font-bold text-gray-900 mb-2">📈 Evolução Semanal</h2>
            <p class="text-gray-800 text-sm font-semibold">Acompanhamento semanal de ordens concluídas (REAL) por prestador</p>
        </div>

        <div id="semanas-container"></div>
        
    </div>
    
    <script>
const loadLS = (key, fallback) => {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch(e) {
    return fallback;
  }
};

// Regras de negócio:
// - REAL* conta como executada (inclui REAL CC CL, REAL CL, etc.)
// - EXCEÇÃO: REAL NEFE (Não Efectuadas) NÃO conta como executada
// - PC é Pendente Cliente (não executada)
function isClosedReal(status) {
  const s = String(status || '').trim().toUpperCase();
  return s.startsWith('REAL') && !s.includes('NEFE');
}
function isClosedNefe(status) {
  const s = String(status || '').trim().toUpperCase();
  return s.startsWith('REAL') && s.includes('NEFE');
}
function isOpen(status) {
  return !isClosedReal(status) && !isClosedNefe(status);
}

const baseline = loadLS('otsBaseline', []);
const prev = loadLS('otsPrev', baseline);
const atual = loadLS('otsData', baseline);

function groupCount(list, predicate) {
  const m = {};
  list.forEach(o => {
    const p = o.empreiteiro || o.prestador || 'SEM_PRESTADOR';
    if (predicate(o)) m[p] = (m[p] || 0) + 1;
  });
  return m;
}

function calcRealTransitions(prevList, atualList) {
  const prevMap = new Map(prevList.map(o => [o.ordem, o.status]));
  const out = {};
  atualList.forEach(o => {
    const p = o.empreiteiro || o.prestador || 'SEM_PRESTADOR';
    const before = prevMap.get(o.ordem);
    const now = o.status;
    if (!isClosedReal(before) && isClosedReal(now)) {
      out[p] = (out[p] || 0) + 1;
    }
  });
  return out;
}

function buildEvolucao() {
  // inicio: baseline (pendentes/abertas)
  const inicioMap = groupCount(baseline, o => isOpen(o.status));
  // restantes: pendentes/abertas hoje
  const restMap = groupCount(atual, o => isOpen(o.status));
  // real: transições para REAL executada (exclui NEFE)
  const realMap = calcRealTransitions(prev, atual);

  const prestadoresOrdem = ['CME Lisboa', 'CME Setúbal', 'Visabeira Loures'];
  const prestadores = {};

  prestadoresOrdem.forEach(p => {
    const ini = inicioMap[p] || 0;
    const real = realMap[p] || 0;
    const rest = restMap[p] || 0;
    const perc = ini > 0 ? (real / ini) * 100 : 0;
    prestadores[p] = { inicio: ini, real: real, percentagem: perc, restantes: rest };
  });

  const totalInicio = Object.values(inicioMap).reduce((a,b)=>a+b,0);
  const totalReal = Object.values(realMap).reduce((a,b)=>a+b,0);
  const totalRest = Object.values(restMap).reduce((a,b)=>a+b,0);
  const totalPerc = totalInicio > 0 ? (totalReal/totalInicio)*100 : 0;

  return {
    semanas: [{
      semana: 0,
      ano: new Date().getFullYear(),
      data_inicio: '',
      data_fim: '',
      data_snapshot: '',
      prestadores,
      total: { inicio: totalInicio, real: totalReal, percentagem: totalPerc, restantes: totalRest }
    }]
  };
}

const EVOLUCAO = buildEvolucao();

// Auto-refresh quando houver upload feito na index
window.addEventListener('storage', (e) => {
  if (e.key === 'otsData' || e.key === 'otsPrev' || e.key === 'otsBaseline') {
    window.location.reload();
  }
});

const semanasContainer = document.getElementById('semanas-container');

EVOLUCAO.semanas.forEach((semana, idx) => {
    const semanaDiv = document.createElement('div');
    semanaDiv.className = 'bg-white rounded-lg shadow-lg p-6 mb-6 border-2 border-gray-200';
    
    const isAtual = idx === EVOLUCAO.semanas.length - 1;
    
    semanaDiv.innerHTML = `
        <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
            <h3 class="text-2xl font-bold text-gray-800">
                📅 Semana ${semana.semana}/${semana.ano}
                ${isAtual ? '<span class="text-sm bg-yellow-400 text-gray-900 px-3 py-1 rounded-full ml-2">BASELINE</span>' : ''}
            </h3>
            <p class="text-sm text-gray-600 font-semibold">${semana.data_inicio} - ${semana.data_fim}</p>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
            ${Object.entries(semana.prestadores).map(([nome, dados]) => `
                <div class="bg-gray-50 rounded-lg p-4 border-l-4 ${
                    nome === 'CME Lisboa' ? 'border-blue-500' :
                    nome === 'CME Setúbal' ? 'border-green-500' : 'border-purple-500'
                }">
                    <h4 class="text-sm font-bold text-gray-700 mb-3">${nome}</h4>
                    <div class="space-y-2">
                        <div class="flex justify-between text-xs">
                            <span class="text-gray-600">Início:</span>
                            <strong class="text-gray-900">${dados.inicio.toLocaleString('pt-PT')}</strong>
                        </div>
                        <div class="flex justify-between text-xs">
                            <span class="text-gray-600">REAL:</span>
                            <strong class="text-green-600">${dados.real.toLocaleString('pt-PT')}</strong>
                        </div>
                        <div class="pt-2 border-t border-gray-200">
                            <p class="text-2xl font-bold ${dados.percentagem > 0 ? 'text-green-600' : 'text-gray-400'} text-center">${dados.percentagem.toFixed(1)}%</p>
                        </div>
                        <div class="flex justify-between text-xs pt-2 border-t border-gray-200">
                            <span class="text-gray-600">Restam:</span>
                            <strong class="text-orange-600">${dados.restantes.toLocaleString('pt-PT')}</strong>
                        </div>
                    </div>
                </div>
            `).join('')}
            
            <div class="bg-gradient-to-br from-gray-800 to-gray-900 rounded-lg p-4 border-l-4 border-yellow-400">
                <h4 class="text-sm font-bold text-yellow-400 mb-3">🏢 TOTAL UO LISBOA</h4>
                <div class="space-y-2">
                    <div class="flex justify-between text-xs">
                        <span class="text-gray-300">Início:</span>
                        <strong class="text-white">${semana.total.inicio.toLocaleString('pt-PT')}</strong>
                    </div>
                    <div class="flex justify-between text-xs">
                        <span class="text-gray-300">REAL:</span>
                        <strong class="text-green-400">${semana.total.real.toLocaleString('pt-PT')}</strong>
                    </div>
                    <div class="pt-2 border-t border-gray-700">
                        <p class="text-3xl font-bold ${semana.total.percentagem > 0 ? 'text-green-400' : 'text-gray-500'} text-center">${semana.total.percentagem.toFixed(1)}%</p>
                    </div>
                    <div class="flex justify-between text-xs pt-2 border-t border-gray-700">
                        <span class="text-gray-300">Restam:</span>
                        <strong class="text-orange-400">${semana.total.restantes.toLocaleString('pt-PT')}</strong>
                    </div>
                </div>
            </div>
        </div>
        
        ${isAtual ? `
            <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-lg">
                <p class="text-sm text-blue-900">
                    <strong>ℹ️ Baseline Semana 10:</strong> Dados de ${semana.data_snapshot} - ponto de partida para tracking semanal. 
                    Na Semana 11 aparecerá a evolução com ordens concluídas (REAL) e percentagens.
                </p>
            </div>
        ` : ''}
    `;
    
    semanasContainer.appendChild(semanaDiv);
});
    </script>
    
</body>
</html>
