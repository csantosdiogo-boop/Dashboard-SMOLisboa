<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Relatório</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">

<h1 class="text-xl font-bold mb-4">Relatório Geral</h1>

<button onclick="exportCSV()" class="mb-4 bg-gray-800 text-white px-4 py-2 rounded">
  Exportar Excel
</button>

<table class="bg-white shadow rounded w-full text-xs">
  <thead id="th" class="bg-gray-200"></thead>
  <tbody id="tb"></tbody>
</table>

<script>
function openDB(){return new Promise(r=>{const d=indexedDB.open('uoLisboaDB',1);d.onsuccess=()=>r(d.result);});}
let rows=[];

(async ()=>{
  const db = await openDB();
  const req = db.transaction('data').objectStore('data').get('csv');
  req.onsuccess = () => {
    rows = req.result.v;
    const h = Object.keys(rows[0]);
    document.getElementById('th').innerHTML =
      `<tr>${h.map(x=>`<th class="p-1">${x}</th>`).join('')}</tr>`;
    document.getElementById('tb').innerHTML =
      rows.map(r=>`<tr>${h.map(x=>`<td class="p-1">${r[x]}</td>`).join('')}</tr>`).join('');
  };
})();

function exportCSV(){
  const h = Object.keys(rows[0]);
  let csv = h.join(',')+'\n';
  rows.forEach(r=>csv+=h.map(x=>r[x]).join(',')+'\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='relatorio_completo.csv';
  a.click();
}
</script>
</body>
</html>
